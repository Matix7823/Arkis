# ARKIS AGENCY — Cloudflare Worker Configuration
name = "arkis"
main = "cloudflare-worker.js"
compatibility_date = "2024-04-01"

# Serves all static assets (HTML, CSS, JS, Images) from the EJS dist compiler
[assets]
directory = "./dist"
binding = "ASSETS"

# Observability configuration to sync logs and traces with the dashboard
[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
